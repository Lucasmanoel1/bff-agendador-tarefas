
services:
  agendador-tarefas:
    build: ..\..\agendador-tarefas\agendador-tarefas
    container_name: agendador-tarefas
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATA_MONGODB_URI= mongodb://mongo:2701/db_agendador
    depends_on:
      - mongo

  bff-agendador:
    build: .
    container_name: bff-agendador
    ports:
      - "8083:8083"
    environment:
      - USUARIO_URL:usuario:8080/usuario
      - AGENDADOR_TAREFAS_URL:agendador_tarefas:8081/tarefas
      - NOFICACAO_URL=notificacao:8082/email

  usuario:
    build: ..\..\usuario\usuario
    container_name: usuario
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/db_usuario
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=admin
    depends_on:
      - postgres

  notificacao:
    build: ..\..\notificacao\notificacao
    container_name: notificacao
    ports:
      - "8084:8084"
  postgres:
    image: postgres:latest
    container_name: postgres
    restart: no
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: db_usuario
    ports:
      - 5433:5432

  mongo:
    image: mongo:latest
    container_name: mongo
    restart: no
    ports:
      - 27017:27017
    environment:
      MONGO_INITDB_DATABASE: db_agendador

networks:
  default:
    driver: bridge